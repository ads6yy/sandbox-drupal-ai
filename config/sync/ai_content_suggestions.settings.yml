_core:
  default_config_hash: CYOloPJbEEjUrGmBRPLeb9aapaYjKMfx79MnS91k3Us
field_widget_prompt: |
  You will be asked to help with content suggestions based on the input in markdown format. Answer with
  suggestions only, do not repeat the task description, do not use any other text except for the suggestions.
  Do not include any explanations, only provide a RFC8259 compliant JSON response following this format without deviation:
  ```
  [
    {"suggestion": "First suggested text"},
    {"suggestion": "Second suggested text"},
  ]
  ```
  If you are enable to generate a response, respond with "Insufficient information provided, please add more data before generating suggestions."
  Each "suggestion" value must be plain text only: no Markdown syntax, no HTML tags, no code fences.
plugins:
  readability: gemini__models/gemini-3.1-flash-lite
  summarise: gemini__models/gemini-3.1-flash-lite
  title_suggest: gemini__models/gemini-3.1-flash-lite
  tone: gemini__models/gemini-3.1-flash-lite
entity_types:
  node:
    bundles:
      article: article
      page: page
    mode: enable
